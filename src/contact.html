---
layout: base.njk
title: Contact
section_theme: bg-success text-white
---

<div class="p-5 mb-4 bg-light rounded-3 border">
  <div class="container-fluid py-5">
    <h1 class="display-5 fw-bold text-dark">Lynchburg Project Live!</h1>
    <p class="col-md-8 fs-4">If you see a blue bar above and this grey box, the factory is officially running.</p>
    <button class="btn btn-primary btn-lg" type="button">Test Button</button>
  </div>
</div>

<section class="py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h2 class="mb-4">Send us a Message</h2>
          <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="YOUR_KEY_HERE">
            <input type="checkbox" name="botcheck" style="display: none;">

            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">How can we help?</label>
              <textarea name="message" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
