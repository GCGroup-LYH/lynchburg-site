<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynchburg CMS | Content Manager</title>

    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <script>
      // Using an event listener ensures the CMS is actually ready 
      // before we try to register the styles.
      window.addEventListener('DOMContentLoaded', () => {
        if (window.CMS) {
          CMS.registerPreviewStyle("/assets/css/main.css");
        }
      });
    </script>
  </head>
  <body>
    </body>
</html>
