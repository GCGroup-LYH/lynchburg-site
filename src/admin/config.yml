backend:
  name: git-gateway # Changed from 'github' to 'git-gateway' for Netlify Identity
  repo: GCGroup-LYH/lynchburg-site
  branch: main
  site_url: https://lynchburg-site.netlify.app

# Ensure these match your actual folder names in src/assets
media_folder: "src/assets/images" 
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/index.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "About Us"
        name: "about"
        file: "src/about.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Services"
        name: "services"
        file: "src/services.html"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - label: "Our Services"
            name: "service_items"
            widget: "list"
            summary: '{{fields.service_name}}' # This shows the name in the list view
            fields:
              - { label: "Service Name", name: "service_name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Featured Service?", name: "featured", widget: "boolean", default: false }

      - label: "FAQ"
        name: "faq"
        file: "src/faq.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "src/contact.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Component Library"
        name: "components"
        file: "src/components.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Page Content", name: "body", widget: "markdown" } # Changed from code to markdown