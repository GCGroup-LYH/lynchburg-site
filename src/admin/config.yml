backend:
  name: git-gateway
  repo: GCGroup-LYH/lynchburg-site
  branch: main
  identity_url: https://auth.decapbridge.com/sites/91f8bcac-af10-4547-8ee3-5b251d8ee060
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
# logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://lynchburg-site.pages.dev
display_url: https://lynchburg-site.pages.dev

# Define the palette once as a "hidden" helper
# We use a dummy collection or a top-level key to store the anchor
_brand_palette: &brand_palette
  label: "Page Theme"
  name: "section_theme"
  widget: "select"
  options:
    - { label: "Lynchburg Blue (Primary)", value: "bg-primary text-white" }
    - { label: "Neutral Gray (Secondary)", value: "bg-secondary text-white" }
    - { label: "Success Green", value: "bg-success text-white" }
    - { label: "Sky Blue (Info)", value: "bg-info text-dark" }
    - { label: "Teal (Warning)", value: "bg-warning text-white" }
    - { label: "Forest Green (Danger)", value: "bg-danger text-white" }
    - { label: "Soft Gray (Light)", value: "bg-light text-dark" }
  default: "bg-primary text-white"

# Ensure these match your actual folder names in src/assets
media_folder: "src/assets/images" 
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/index.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - <<: *brand_palette
          - label: "Page Sections"
            name: "sections"
            widget: "list"
            types:
              - label: "Text Block"
                name: "text_block"
                widget: "object"
                fields:
                  - { label: "Content", name: "content", widget: "markdown" }
              - label: "Call to Action"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Headline", name: "headline", widget: "string" }
                  - { label: "Button Link", name: "link", widget: "string" }

      - label: "About Us"
        name: "about"
        file: "src/about.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - <<: *brand_palette
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Services"
        name: "services"
        file: "src/services.html"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - <<: *brand_palette
          - { label: "Intro Text", name: "intro", widget: "text", hint: "A short catchphrase above the service cards." }
          - label: "Our Services"
            name: "services_list"
            widget: "list"
            summary: '{{fields.name}}'
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Service Image/Icon", name: "image", widget: "image", required: false }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $150/hr or Starting at $500" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Featured Service?", name: "featured", widget: "boolean", default: false }
              - { label: "Button Text", name: "cta_text", widget: "string", default: "Learn More" }

      - label: "FAQ"
        name: "faq"
        file: "src/faq.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - <<: *brand_palette
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "src/contact.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - <<: *brand_palette
          - { label: "Body Content", name: "body", widget: "markdown" }

      - label: "Component Library"
        name: "components"
        file: "src/components.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Page Content", name: "body", widget: "markdown" } # Changed from code to markdown