backend:
  name: github
  repo: GCGroup-LYH/lynchburg-site
  branch: main
  site_url: https://lynchburg-site.emcitconsultants.workers.dev
  base_url: https://sveltia-cms-auth.emcitconsultants.workers.dev 

# 1. YOUR BRAND PALETTE ANCHOR
_brand_palette: &brand_palette
  label: "Section Theme"
  name: "section_theme"
  widget: "select"
  options:
    - { label: "Standard (Adapts to Light/Dark)", value: "bg-body text-body" }
    - { label: "Subtle Contrast (Adapts to Light/Dark)", value: "bg-body-tertiary text-body" }
    - { label: "Brand Blue", value: "bg-primary text-white" }
    # Teal is actually $warning in your SCSS
    - { label: "Brand Teal", value: "bg-warning text-white" } 
    # Earthy/Forest Green is actually $danger in your SCSS
    - { label: "Earthy Green", value: "bg-danger text-white" }
    - { label: "Soft Blue (Info)", value: "bg-info text-dark" }
    # Soft Gray is $light in your SCSS
    - { label: "Soft Gray", value: "bg-light text-dark" }
    # Neutral Dark Gray is $secondary in your SCSS
    - { label: "Neutral Dark Gray", value: "bg-secondary text-white" }
  default: "bg-body text-body"

_text_palette: &text_palette
  label: "Icon/Text Color"
  name: "icon_color"
  widget: "select"
  options:
    - { label: "Brand Blue", value: "text-primary" }
    # Teal mapped to warning
    - { label: "Brand Teal", value: "text-warning" }
    # Earthy Green mapped to danger
    - { label: "Earthy Green", value: "text-danger" }
    - { label: "Soft Blue (Info)", value: "text-info" }
    # Soft Gray mapped to light
    - { label: "Soft Gray", value: "text-light" } 
    # Dark Gray mapped to secondary
    - { label: "Neutral Dark Gray", value: "text-secondary" }
    - { label: "White (For dark backgrounds)", value: "text-white" }
  default: "text-primary"
  required: false

# 2. YOUR UNIVERSAL PAGE BUILDER ANCHOR
_page_builder: &page_builder
  label: "Page Sections"
  name: "sections"
  widget: "list"
  summary: '{{fields.headline}}{{fields.title}}{{fields.heading}} ({{type}})'
  types:
    - label: "Home Hero (Centered Lottie)"
      name: "hero_home"
      widget: "object"
      fields:
        - { label: "Lottie File", name: "lottie_file", widget: "file", hint: "Upload the .json file for your line art animation." }
        - { label: "Primary Button Text", name: "btn_1_text", widget: "string", default: "Meet Our Team" }
        - { label: "Primary Button Link", name: "btn_1_link", widget: "string", default: "/team" }
        - { label: "Secondary Button Text", name: "btn_2_text", widget: "string", default: "Learn More" }
        - { label: "Secondary Button Link", name: "btn_2_link", widget: "string", default: "/about" }
        - *brand_palette

    - label: "Inner Page Hero (Standard)"
      name: "hero_inner"
      widget: "object"
      fields:
        - { label: "Headline", name: "headline", widget: "string" }
        - { label: "Subtext", name: "subtext", widget: "text", required: false }
        - { label: "Background Image", name: "bg_image", widget: "image", required: false }
        - *brand_palette
        - *text_palette
        
    - label: "Text & Image Split"
      name: "split_block"
      widget: "object"
      fields:
        - { label: "Heading", name: "heading", widget: "string" }
        - { label: "Body Text", name: "body", widget: "markdown" }
        - { label: "Image", name: "image", widget: "image" }
        - { label: "Image Description (Alt Text)", name: "alt", widget: "string", required: true, hint: "Describe the image for visually impaired users. Leave blank ONLY if the image is purely decorative." }
        - { label: "Image Alignment", name: "align", widget: "select", options: ["Left", "Right"], default: "Right" }
        - *brand_palette
        
    - label: "Featured Google Reviews"
      name: "testimonials"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "What Our Clients Say" }
        - *brand_palette
        - label: "Reviews"
          name: "review_list"
          widget: "list"
          fields:
            - { label: "Reviewer Name", name: "author", widget: "string" }
            - { label: "Review Text", name: "quote", widget: "text" }
            
    - label: "Call to Action (CTA)"
      name: "cta"
      widget: "object"
      fields:
        - { label: "Heading", name: "text", widget: "string" } 
        - { label: "Button Text", name: "btn_text", widget: "string", default: "Contact Us" }
        - { label: "Button Link", name: "btn_link", widget: "string", default: "/contact" }
        - label: "Button Color"
          name: "btn_color"
          widget: "select"
          required: false
          options:
            - { label: "Outline Light", value: "btn-outline-light" }
            - { label: "Solid Primary", value: "btn-primary" }
            - { label: "Solid Dark", value: "btn-dark" }
            - { label: "Solid Info (Light Blue)", value: "btn-info" }
          default: "btn-outline-light"

    - label: "Areas of Focus (Cards)"
      name: "features"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "Areas of Focus" }
        - *brand_palette
        - label: "Cards"
          name: "card_list"
          widget: "list"
          summary: '{{fields.name}}'
          fields:
            - { label: "Card Title", name: "name", widget: "string" }
            - { label: "Short Description", name: "desc", widget: "text", hint: "The default brief text shown." }
            - { label: "Expanded Text (Hover)", name: "expanded_desc", widget: "text", required: false, hint: "The extra text that appears when a user hovers over the card." }

    - label: "FAQ Accordion"
      name: "faq"
      widget: "object"
      fields:
              - { label: "Section Title", name: "title", widget: "string", default: "Frequently Asked Questions" }
              - label: "Questions & Answers"
                name: "faq_list"
                widget: "list"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }

    - label: "Meet the Team Grid"
      name: "team"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "Our Therapists" }

    - label: "Contact Form"
      name: "contact_form"
      widget: "object"
      fields:
        - label: "Route Form To:"
          name: "route_to"
          widget: "select"
          options: ["main", "brittany", "lindsey", "member3", "member4"]
          default: "main"
        - label: "Button Color"
          name: "button_color"
          widget: "select"
          options: 
            - { label: "Forest Green", value: "danger" }
            - { label: "Brand Blue", value: "primary" }
            - { label: "Teal", value: "warning" }
            - { label: "Sky Blue", value: "info" }
          default: "danger"

    - label: "Rates & Insurance"
      name: "rates"
      widget: "object"
      fields:
              - { label: "Section Title", name: "title", widget: "string", default: "Rates & Insurance" }
              - { label: "Introductory Text", name: "intro", widget: "text", required: false, hint: "A brief sentence about your sliding scale or out-of-network policies." }
              - label: "Service Rates"
                name: "rate_list"
                widget: "list"
                fields:
                  - { label: "Service (e.g., 50-Minute Intake)", name: "service", widget: "string" }
                  - { label: "Price", name: "price", widget: "string" }
              - label: "Accepted Insurances"
                name: "insurance_list"
                widget: "list"
                fields:
                  - { label: "Insurance Provider", name: "provider", widget: "string" }

    - label: "Location & Map"
      name: "location"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "Our Office" }
        - { label: "Address", name: "address", widget: "text", hint: "Press enter to create line breaks." }
        - { label: "Google Maps Embed Code", name: "map_iframe", widget: "text", hint: "Go to Google Maps, find your office, click Share > Embed a map, copy the HTML, and paste it here." }

    - label: "Rich Text / Article"
      name: "rich_text"
      widget: "object"
      fields:
        - { label: "Content", name: "content", widget: "markdown", hint: "Use this for standard paragraphs, bulleted lists, and bold/italic text." }

    - label: "Divider & Spacing"
      name: "divider"
      widget: "object"
      fields:
        - label: "Visual Style"
          name: "style"
          widget: "select"
          options:
            - { label: "Invisible Space (Standard)", value: "py-5" }
            - { label: "Invisible Space (Small)", value: "py-3" }
            - { label: "Visible Subtle Line", value: "line" }
          default: "py-5"
    
    - label: "Image Carousel"
      name: "carousel"
      widget: "object"
      fields:
        - { label: "Section Title (Optional)", name: "title", widget: "string", required: false }
        - label: "Slides"
          name: "slide_list"
          widget: "list"
          fields:
            - { label: "Image", name: "image", widget: "image" }
            - { label: "Alt Text (For Screen Readers)", name: "alt", widget: "string", required: true, hint: "Required for ADA compliance. Describe the image briefly." }
            - { label: "Caption Heading", name: "heading", widget: "string", required: false }
            - { label: "Caption Text", name: "text", widget: "string", required: false }

    - label: "Emergency / Alert Banner"
      name: "alert_banner"
      widget: "object"
      fields:
        - label: "Alert Type (Border Color)"
          name: "theme"
          widget: "select"
          options:
            - { label: "Emergency (Lime Green)", value: "border-success" }
            - { label: "Critical (Red)", value: "border-danger" }
            - { label: "Information (Teal)", value: "border-warning" }
          default: "border-success"
        - { label: "Headline", name: "headline", widget: "string", default: "In Crisis? Get Help Now." }
        - { label: "Message", name: "message", widget: "markdown", hint: "Keep this to one or two sentences. You can use links like [911](tel:911)." }

    - label: "Logo Cloud (Insurances / Associations)"
      name: "logo_cloud"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "Accepted Insurances & Professional Affiliations" }
        - label: "Logos"
          name: "logo_list"
          widget: "list"
          fields:
            - { label: "Logo Image", name: "image", widget: "image", hint: "Upload a transparent PNG or SVG for best results." }
            - { label: "Alt Text (Required)", name: "alt", widget: "string", hint: "E.g., 'Blue Cross Blue Shield Logo'" }

    - label: "Methodologies & Modalities"
      name: "modalities"
      widget: "object"
      fields:
        - { label: "Section Title", name: "title", widget: "string", default: "Therapeutic Approaches" }
        
        # 1. SECTION BACKGROUND
        - label: "Section Background"
          name: "section_bg"
          widget: "select"
          options:
            - { label: "Soft Gray (Light)", value: "bg-light" }
            - { label: "White", value: "bg-white" }
            - { label: "Teal", value: "bg-warning" }
            - { label: "Dark Green", value: "bg-danger" }
            - { label: "Dark/Black", value: "bg-dark" }
          default: "bg-light"

        # 2. PILL INNER COLOR
        - label: "Pill Background Color"
          name: "pill_bg"
          widget: "select"
          options:
            - { label: "White", value: "bg-white" }
            - { label: "Teal", value: "bg-warning" }
            - { label: "Dark Green", value: "bg-danger" }
            - { label: "Transparent", value: "bg-transparent" }
          default: "bg-white"
          
        # 3. PILL OUTLINE
        - label: "Pill Border Color"
          name: "pill_border"
          widget: "select"
          options:
            - { label: "Teal", value: "border-warning" }
            - { label: "Dark Green", value: "border-danger" }
            - { label: "White", value: "border-white" }
            - { label: "No Border", value: "border-0" }
          default: "border-warning"
          
        # 4. PILL TEXT COLOR
        - label: "Pill Text Color"
          name: "pill_text"
          widget: "select"
          options:
            - { label: "Teal", value: "text-warning" }
            - { label: "Dark Green", value: "text-danger" }
            - { label: "White", value: "text-white" }
            - { label: "Dark Text", value: "text-dark" }
          default: "text-warning"
          
        # --- THE GRID ITEMS ---
        - label: "Modalities List"
          name: "modality_list"
          widget: "list"
          summary: '{{fields.name}}'
          fields:
            - { label: "Modality Name", name: "name", widget: "string" }

# Ensure these match your actual folder names in src/assets
media_folder: "src/assets/images" 
public_folder: "/assets/images"

collections:
  # 3. GLOBAL SETTINGS (Nav & Footer)
  - name: "global"
    label: "Global Settings"
    files:
      - label: "Site Header & Contact Info"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Business Name (Also used for SEO)", name: "name", widget: "string" }
          - { label: "Main Logo", name: "logo", widget: "image", required: false, hint: "Upload a transparent PNG" }
          - { label: "Default SEO Description", name: "site_description", widget: "text", required: false, hint: "A short paragraph describing the practice for Google search results." }
          - { label: "Client Portal URL", name: "practiceLink", widget: "string" }
          - label: "Portal Button Color"
            name: "portal_btn_color"
            widget: "select"
            required: false
            options:
              - { label: "Earthy Green (Solid)", value: "btn-danger text-white" }
              - { label: "Teal (Solid)", value: "btn-warning text-white" }
              - { label: "Main Brand Blue (Solid)", value: "btn-primary text-white" }
              - { label: "Neutral Dark Gray (Solid)", value: "btn-secondary text-white" }
              - { label: "Outline Earthy Green", value: "btn-outline-danger" }
              - { label: "Outline Teal", value: "btn-outline-warning" }
              - { label: "Outline Brand Blue", value: "btn-outline-primary" }
            default: "btn-danger text-white"
          - { label: "Contact Email", name: "contactEmail", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - label: "Navigation Menu"
            name: "nav_links"
            widget: "list"
            summary: '{{fields.text}}'
            fields:
              - { label: "Link Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Footer Links"
            name: "footer_links"
            widget: "list"
            summary: '{{fields.text}}'
            fields:
              - { label: "Link Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - { label: "Footer Text", name: "footer_text", widget: "string", default: "Located in Lynchburg, VA" }
          - label: "Footer Background Theme"
            name: "footer_theme"
            widget: "select"
            options:
              - { label: "Standard (Adapts to Light/Dark)", value: "bg-body text-body" }
              - { label: "Earthy Green", value: "bg-danger text-white" }
              - { label: "Teal", value: "bg-warning text-white" }
              - { label: "Brand Blue", value: "bg-primary text-white" }
              - { label: "Neutral Dark Gray", value: "bg-secondary text-white" }
              - { label: "Soft Gray", value: "bg-light text-dark" }
            default: "bg-danger text-white"

          - label: "Social Media Links"
            name: "social_links"
            widget: "list"
            required: false
            summary: '{{fields.platform}}'
            fields:
              - label: "Platform"
                name: "platform"
                widget: "select"
                options: ["Facebook", "Instagram", "LinkedIn", "Twitter", "YouTube"]
              - { label: "Profile URL", name: "url", widget: "string" }

  # 4. MODULAR PAGES
  - name: "pages"
    label: "Pages"
    editor:
      preview: false
    files:
      - label: "Home Page"
        name: "home"
        file: "src/index.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "Home" }
          - *page_builder

      - label: "About Us"
        name: "about"
        file: "src/about.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "About Us" }
          - *page_builder

      - label: "Meet the Team"
        name: "team"
        file: "src/team.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "Services" }
          - *page_builder

      - label: "Contact"
        name: "contact"
        file: "src/contact.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "Contact" }
          - *page_builder

      - label: "Component Library"
        name: "components"
        file: "src/components.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "Components" }
          - *page_builder
          
      - label: "Privacy Policy"
        name: "privacy"
        file: "src/privacy.njk"
        fields:
          - { label: "SEO Title", name: "title", widget: "string", default: "Privacy Policy" }
          - *page_builder

  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Our Team" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Short Summary", name: "summary", widget: "text", hint: "A brief intro for the blog list page." }
      - { label: "Post Content", name: "body", widget: "markdown" }
  
  - name: "team"
    label: "Team Members"
    label_singular: "Team Member"
    folder: "src/team" 
    create: true
    slug: "{{slug}}" 
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "bio.njk" }
      - label: "Clinician Type"
        name: "clinician_type"
        widget: "select"
        options:
          - "Therapist"
          - "Residential Clinician"
        default: "Therapist"
        hint: "This determines which section of the Meet the Team page they appear in."
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Credentials / Title", name: "role", widget: "string", hint: "e.g., LPC, LMFT" }
      - { label: "Headshot", name: "image", widget: "image" }
      - { label: "Short Bio (For the Card)", name: "short_bio", widget: "text", hint: "A 2-3 sentence teaser for the grid." }
      - { label: "Full Bio", name: "body", widget: "markdown", hint: "The complete bio for their individual page." }
      - { label: "Card Quote", name: "quote", widget: "text", hint: "The teal quote that appears on the therapist's card." }
      - { label: "Direct Email", name: "email", widget: "string", hint: "Where should the contact form on their bio page send emails?" }
      
      # The individual list of approaches for this specific therapist
      - label: "Therapeutic Approaches"
        name: "approaches"
        widget: "list"
        summary: '{{fields.approach}}'
        field: { label: "Approach", name: "approach", widget: "string" }